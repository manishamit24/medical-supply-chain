<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Medical Supply Chain Tracker</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>&#x1F489; Medical Supply Chain Tracker</h1>
    <p>Track and manage medicine inventory across the supply chain</p>
  </header>

  <main>
    <!-- Add / Edit Form -->
    <section class="form-section">
      <h2 id="form-title">Add New Medicine</h2>
      <form id="medicine-form">
        <input type="hidden" id="medicine-id" />

        <div class="form-grid">
          <div class="form-group">
            <label for="name">Medicine Name <span class="required">*</span></label>
            <input type="text" id="name" placeholder="e.g. Paracetamol" required />
          </div>

          <div class="form-group">
            <label for="manufacturer">Manufacturer <span class="required">*</span></label>
            <input type="text" id="manufacturer" placeholder="e.g. MediCorp Ltd." required />
          </div>

          <div class="form-group">
            <label for="batchNumber">Batch Number <span class="required">*</span></label>
            <input type="text" id="batchNumber" placeholder="e.g. BATCH-2024-001" required />
          </div>

          <div class="form-group">
            <label for="expiryDate">Expiry Date <span class="required">*</span></label>
            <input type="date" id="expiryDate" required />
          </div>

          <div class="form-group">
            <label for="quantity">Quantity <span class="required">*</span></label>
            <input type="number" id="quantity" placeholder="e.g. 500" min="0" required />
          </div>

          <div class="form-group">
            <label for="location">Location / Warehouse <span class="required">*</span></label>
            <input type="text" id="location" placeholder="e.g. Warehouse A, New York" required />
          </div>

          <div class="form-group">
            <label for="status">Status</label>
            <select id="status">
              <option value="In Stock">In Stock</option>
              <option value="In Transit">In Transit</option>
              <option value="Delivered">Delivered</option>
              <option value="Out of Stock">Out of Stock</option>
              <option value="Recalled">Recalled</option>
            </select>
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" id="submit-btn" class="btn btn-primary">Add Medicine</button>
          <button type="button" id="cancel-btn" class="btn btn-secondary hidden">Cancel</button>
        </div>
      </form>
    </section>

    <!-- Alert / notification -->
    <div id="alert" class="alert hidden"></div>

    <!-- Medicine List -->
    <section class="list-section">
      <div class="list-header">
        <h2>Medicine Inventory</h2>
        <span id="medicine-count" class="badge">0 items</span>
      </div>

      <div class="search-bar">
        <input type="text" id="search" placeholder="Search by name, batch number, or location..." />
      </div>

      <div id="medicine-list" class="medicine-grid">
        <p class="empty-state">No medicines added yet. Use the form above to add one.</p>
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2024 Medical Supply Chain Tracker</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
